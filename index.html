<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Batok Ungu | Solidaritas Tanpa Batas</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
    --primary: #7b2cbf;
    --primary-light: #c77dff;
    --bg-dark: #0d0d1a;
    --bg-card: #1a1a2e;
    --text-main: #ffffff;
    --text-dim: #b0b0b0;
}

* {
    box-sizing: border-box;
    scroll-behavior: smooth;
}

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: var(--bg-dark);
    color: var(--text-main);
    line-height: 1.6;
    overflow-x: hidden;
    padding-top: 80px;
}

/* NAV */
nav {
    position: fixed;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 10%;
    background: rgba(13,13,26,0.95);
    z-index: 1000;
}

nav h2 {
    color: var(--primary-light);
    cursor: pointer;
}

.nav-links a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
}

/* HERO */
#home {
    height: 100vh;
    display: flex;
    align-items: center;
    padding: 0 10%;
    background:
        linear-gradient(rgba(13,13,26,0.4), rgba(13,13,26,0.7)),
        url('batokungu/hero.jpg.JPG');
    background-size: cover;
    background-position: center;
}

/* SECTION */
section {
    padding: 80px 10%;
}

.section-title {
    text-align: center;
    color: var(--primary-light);
    margin-bottom: 30px;
}

/* MEMBER */
.member-list {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
}

.member-tag {
    background: var(--bg-card);
    padding: 10px 20px;
    border-radius: 20px;
    cursor: pointer;
    border: 1px solid var(--primary);
}

/* BASECAMP */
.basecamp-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
}

.basecamp-card {
    background: var(--bg-card);
    padding: 20px;
    border-radius: 15px;
}

/* GALLERY FIX */
.gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 15px;
}

.gallery-item {
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
}

.gallery-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: 0.3s;
}

.gallery-item img:hover {
    transform: scale(1.05);
}

/* LIGHTBOX */
.lightbox {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.lightbox img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 10px;
}

.lightbox span {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 2rem;
    color: white;
    cursor: pointer;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: var(--bg-card);
    padding: 30px;
    border-radius: 20px;
    text-align: center;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
<h2 onclick="window.scrollTo(0,0)">BATOK UNGU</h2>
<div class="nav-links">
<a href="#home">Home</a>
<a href="#history">Sejarah</a>
<a href="#members">Anggota</a>
<a href="#basecamp">Basecamp</a>
<a href="#gallery">Gallery</a>
<a href="#contact">Kontak</a>
</div>
</nav>

<!-- HERO -->
<section id="home">
<div>
<h1>BATOK UNGU</h1>
<p>Solidaritas tanpa batas sejak 2017</p>
</div>
</section>

<!-- HISTORY -->
<section id="history">
<h2 class="section-title">Sejarah Kami</h2>
<p>Batok Ungu berdiri sejak 2017...</p>
</section>

<!-- MEMBERS -->
<section id="members">
<h2 class="section-title">Anggota</h2>
<div class="member-list" id="memberList"></div>
</section>

<!-- BASECAMP -->
<section id="basecamp">
<h2 class="section-title">Basecamp</h2>
<div class="basecamp-grid">
<div class="basecamp-card">Wedangan Ptpn</div>
<div class="basecamp-card">Warmindo Sukses</div>
<div class="basecamp-card">Rumah Mas Febi</div>
</div>
</section>

<!-- GALLERY (FIXED FULL) -->
<section id="gallery">
<h2 class="section-title">Gallery Momen</h2>

<div class="gallery-grid">
<div class="gallery-item"><img src="batokungu/1696067063265.jpg"></div>
<div class="gallery-item"><img src="batokungu/1696521288470.jpg"></div>
<div class="gallery-item"><img src="batokungu/IMG_0442.JPG"></div>
<div class="gallery-item"><img src="batokungu/WhatsApp Image 2026-01-14 at 15.08.54.jpeg"></div>
</div>
</section>

<!-- CONTACT -->
<section id="contact">
<h2 class="section-title">Kontak</h2>
<p>Instagram & WhatsApp tersedia</p>
</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
<span onclick="closeLB()">&times;</span>
<img id="lbImg">
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<h3 id="mName"></h3>
</div>
</div>

<script>
// MEMBERS
const members = [
"Andra","Boghy","Desta","Delfi","Gean","Jati","Jojo","Panji","Rico","Rifaldi","Sefa","Sutha"
];

const box = document.getElementById("memberList");

members.forEach(n=>{
let d=document.createElement("div");
d.className="member-tag";
d.innerText=n;
box.appendChild(d);
});

// LIGHTBOX
const imgs=document.querySelectorAll(".gallery-item img");
const lb=document.getElementById("lightbox");
const lbImg=document.getElementById("lbImg");

imgs.forEach(i=>{
i.onclick=()=>{
lb.style.display="flex";
lbImg.src=i.src;
}
});

function closeLB(){
lb.style.display="none";
}
</script>

</body>
</html>
