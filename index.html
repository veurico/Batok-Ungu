<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Batok Ungu | Solidaritas Tanpa Batas</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
    --primary: #7b2cbf;
    --primary-light: #c77dff;
    --bg-dark: #0d0d1a;
    --bg-card: #1a1a2e;
    --text-main: #ffffff;
    --text-dim: #b0b0b0;
}

* { box-sizing: border-box; scroll-behavior: smooth; }

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: var(--bg-dark);
    color: var(--text-main);
}

/* NAV */
nav {
    position: fixed;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 15px 10%;
    background: rgba(13,13,26,0.95);
    z-index: 1000;
}

nav h2 { color: var(--primary-light); cursor: pointer; }

.nav-links a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
}

/* HERO FIX */
#home {
    height: 100vh;
    display: flex;
    align-items: center;
    padding: 0 10%;
    background:
        linear-gradient(rgba(13,13,26,0.6), rgba(13,13,26,0.6)),
        url('batokungu/hero.jpg.JPG');
    background-size: cover;
    background-position: center;
}

.hero-text h1 {
    font-size: 4rem;
    color: var(--primary-light);
}

/* SECTION */
section { padding: 90px 10%; }

.section-title {
    text-align: center;
    color: var(--primary-light);
    font-size: 2.5rem;
}

/* HISTORY */
.history-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.history-card {
    background: var(--bg-card);
    padding: 20px;
    border-radius: 15px;
}

/* MEMBER */
.member-list {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
}

.member-tag {
    background: var(--bg-card);
    padding: 10px 20px;
    border-radius: 30px;
    cursor: pointer;
}

/* BASECAMP */
.basecamp-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap: 15px;
}

.basecamp-card {
    background: var(--bg-card);
    padding: 20px;
    border-radius: 15px;
}

/* GALLERY FIX */
.gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
    gap: 15px;
}

.gallery-item {
    position: relative;
    overflow: hidden;
    border-radius: 15px;
}

.gallery-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* CONTACT */
.contact-box {
    text-align: center;
    background: var(--bg-card);
    padding: 30px;
    border-radius: 20px;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 30px;
    opacity: 0.6;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
<h2 onclick="window.scrollTo(0,0)">BATOK UNGU</h2>
<div class="nav-links">
<a href="#home">Home</a>
<a href="#history">Sejarah</a>
<a href="#members">Anggota</a>
<a href="#basecamp">Basecamp</a>
<a href="#gallery">Gallery</a>
<a href="#contact">Kontak</a>
</div>
</nav>

<!-- HERO -->
<section id="home">
<div class="hero-text">
<h1>BATOK UNGU</h1>
<p>Solidaritas tanpa batas sejak 2017</p>
</div>
</section>

<!-- HISTORY -->
<section id="history">
<h2 class="section-title">Sejarah</h2>
<div class="history-grid">
<div class="history-card">Awal terbentuk 2017</div>
<div class="history-card">Perjalanan & visi</div>
</div>
</section>

<!-- MEMBERS -->
<section id="members">
<h2 class="section-title">Anggota</h2>
<div class="member-list" id="memberList"></div>
</section>

<!-- BASECAMP -->
<section id="basecamp">
<h2 class="section-title">Basecamp</h2>
<div class="basecamp-grid">
<div class="basecamp-card">Wedangan</div>
<div class="basecamp-card">Warmindo</div>
</div>
</section>

<!-- GALLERY (FIXED TOTAL) -->
<section id="gallery">
<h2 class="section-title">Gallery</h2>

<div class="gallery-grid">
<div class="gallery-item">
<img src="batokungu/1696067063265.jpg">
</div>

<div class="gallery-item">
<img src="batokungu/1696521288470.jpg">
</div>

<div class="gallery-item">
<img src="batokungu/IMG_0442.JPG">
</div>

<div class="gallery-item">
<img src="batokungu/WhatsApp Image 2026-01-14 at 15.08.54.jpeg">
</div>
</div>

</section>

<!-- CONTACT -->
<section id="contact">
<h2 class="section-title">Kontak</h2>
<div class="contact-box">
Instagram & WhatsApp
</div>
</section>

<footer>
BATOK UNGU © 2017 - 2026
</footer>

</body>
</html>
