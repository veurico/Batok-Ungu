<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Batok Ungu</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
--primary:#7b2cbf;
--primary-light:#c77dff;
--bg-dark:#0d0d1a;
--bg-card:#1a1a2e;
--text:#fff;
}

*{box-sizing:border-box;scroll-behavior:smooth;}

body{
margin:0;
font-family:Poppins;
background:var(--bg-dark);
color:var(--text);
overflow-x:hidden;
}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:15px 10%;
background:#0d0d1af0;
z-index:999;
}

nav h2{color:var(--primary-light);}

/* HERO */
#home{
height:100vh;
display:flex;
align-items:center;
padding:0 10%;
background:
linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.6)),
url('batokungu/hero.jpg.JPG');
background-size:cover;
}

/* SECTION */
section{padding:80px 10%;}

.section-title{text-align:center;color:var(--primary-light);}

/* MEMBER */
.member-list{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
}

.member-tag{
padding:10px 15px;
background:var(--bg-card);
border-radius:20px;
cursor:pointer;
}

/* BASECAMP */
.basecamp-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

.basecamp-card{
background:var(--bg-card);
padding:15px;
border-radius:10px;
}

/* GALLERY */
.gallery-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:10px;
}

.gallery-item{
overflow:hidden;
border-radius:10px;
cursor:pointer;
}

.gallery-item img{
width:100%;
height:100%;
object-fit:cover;
transition:0.3s;
}

.gallery-item img:hover{transform:scale(1.05);}

/* LIGHTBOX */
.lightbox{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
z-index:9999;
}

.lightbox img{
max-width:90%;
max-height:90%;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.modal-content{
background:var(--bg-card);
padding:30px;
border-radius:15px;
}

/* MUSIC */
.music-control{
position:fixed;
bottom:20px;
left:20px;
width:50px;
height:50px;
border-radius:50%;
background:var(--primary);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
<h2>BATOK UNGU</h2>
</nav>

<!-- HERO -->
<section id="home">
<div>
<h1>BATOK UNGU</h1>
<p>Solidaritas tanpa batas</p>
</div>
</section>

<!-- HISTORY -->
<section>
<h2 class="section-title">Sejarah</h2>
<p>Batok Ungu berdiri sejak 2017...</p>
</section>

<!-- MEMBERS -->
<section>
<h2 class="section-title">Anggota</h2>
<div class="member-list" id="members"></div>
</section>

<!-- BASECAMP -->
<section>
<h2 class="section-title">Basecamp</h2>
<div class="basecamp-grid">
<div class="basecamp-card">Wedangan</div>
<div class="basecamp-card">Warmindo</div>
<div class="basecamp-card">Rumah Mas Febi</div>
</div>
</section>

<!-- GALLERY (FIXED) -->
<section>
<h2 class="section-title">Gallery</h2>

<div class="gallery-grid">
<div class="gallery-item"><img src="batokungu/1696067063265.jpg"></div>
<div class="gallery-item"><img src="batokungu/1696521288470.jpg"></div>
<div class="gallery-item"><img src="batokungu/IMG_0442.JPG"></div>
<div class="gallery-item"><img src="batokungu/WhatsApp Image 2026-01-14.jpeg"></div>
</div>
</section>

<!-- CONTACT -->
<section>
<h2 class="section-title">Kontak</h2>
<p>Instagram & WhatsApp tersedia</p>
</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
<img id="lightboxImg">
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<h3 id="mName"></h3>
</div>
</div>

<!-- MUSIC -->
<div class="music-control" id="music">🎵</div>

<audio id="bgm" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>
// MEMBERS
const members=["Andra","Boghy","Desta","Rico"];
const box=document.getElementById("members");

members.forEach(n=>{
let d=document.createElement("div");
d.className="member-tag";
d.innerText=n;
box.appendChild(d);
});

// LIGHTBOX
document.querySelectorAll(".gallery-item img").forEach(img=>{
img.onclick=()=>{
document.getElementById("lightbox").style.display="flex";
document.getElementById("lightboxImg").src=img.src;
}
});

// CLOSE LIGHTBOX
document.getElementById("lightbox").onclick=()=>{
document.getElementById("lightbox").style.display="none";
};

// MUSIC
let play=false;
document.getElementById("music").onclick=()=>{
const bgm=document.getElementById("bgm");
play?bgm.pause():bgm.play();
play=!play;
};
</script>

</body>
</html>
